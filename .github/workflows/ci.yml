name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # ビルド時の zod 検証通過用（DB / Supabase へは接続しない）
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/kanri_tool_ci
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/kanri_tool_ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
