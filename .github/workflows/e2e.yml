name: E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

# リポジトリ Variables で `E2E_ENABLED=true` を設定し、
# 下記 Secrets を登録した場合のみ E2E を実行する。
# 未設定時はジョブ自体をスキップし、通常 CI は ci.yml が担当する。

jobs:
  e2e:
    if: vars.E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_STAFF_EMAIL: ${{ secrets.E2E_STAFF_EMAIL }}
      E2E_STAFF_PASSWORD: ${{ secrets.E2E_STAFF_PASSWORD }}
      E2E_RESIDENT_ID: ${{ secrets.E2E_RESIDENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
